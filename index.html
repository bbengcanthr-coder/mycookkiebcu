<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คุ้กกี้ของน้องปฐมนิเทศ</title>
    <style>
        /* ตั้งค่าฟอนต์หลัก และใช้ sans-serif (ฟอนต์ไม่มีหัว) เป็นตัวสำรอง */
        @font-face {
            font-family: 'DSBanballTester';
            src: url('DSBanballTester.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* พื้นหลังลายโพกาดอทสีดำจางๆ */
            background-image: radial-gradient(rgba(0, 0, 0, 0.08) 15%, transparent 16%), 
                              radial-gradient(rgba(0, 0, 0, 0.08) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'DSBanballTester', sans-serif; 
            overflow: hidden;
            touch-action: none; /* ป้องกันการเลื่อนหน้าจอเวลาแตะบนมือถือ */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* แอนิเมชันสลับสีพาสเทลสำหรับชื่อเกม */
        @keyframes pastelColors {
            0% { color: #FFB3BA; }
            25% { color: #FFDFBA; }
            50% { color: #FFFFBA; }
            75% { color: #BAFFC9; }
            100% { color: #BAE1FF; }
        }

        .title {
            margin-top: 10%;
            font-size: 2.8rem;
            text-align: center;
            text-shadow: 2px 2px 0px #fff, -1px -1px 0px #fff;
            animation: pastelColors 4s infinite alternate;
            line-height: 1.2;
        }

        .score {
            font-size: 2.5rem;
            color: #FFB3BA;
            text-shadow: 2px 2px 0px #fff;
            margin-top: 10px;
        }

        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #FFDFBA;
        }

        button {
            font-family: 'DSBanballTester', sans-serif;
            font-size: 1.5rem;
            background: #BAFFC9;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: #555;
            cursor: pointer;
            box-shadow: 0 4px 0px #9ee5b0;
            transition: transform 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #9ee5b0;
        }

        #gameOverScreen {
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <h1 class="title">คุ้กกี้ของน้อง<br>ปฐมนิเทศ</h1>
            <div class="score" id="scoreDisplay">0</div>
        </div>

        <div class="screen" id="startScreen">
            <h2 style="color: #FFB3BA; margin-top: 0;">พร้อมไหม?</h2>
            <p style="color: #666;">แตะหน้าจอเพื่อปล่อยคุ้กกี้ให้ลงกล่อง</p>
            <button id="startBtn">เริ่มต่อคุ้กกี้เลย!</button>
        </div>

        <div class="screen" id="gameOverScreen">
            <h2 style="color: #FFB3BA; margin-top: 0;">ว้าา ตกซะแล้ว!</h2>
            <p style="color: #666;">น้องต่อคุ้กกี้ได้ <span id="finalScore" style="font-size: 1.5rem; font-weight: bold; color: #FFDFBA;"></span> ชั้น</p>
            <button id="restartBtn">เล่นอีกรอบ</button>
        </div>
    </div>

    <audio id="bgMusic" src="cute-bgm.mp3" loop preload="auto"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const bgMusic = document.getElementById('bgMusic');

        // ตั้งค่าขนาดและระบบวาดภาพ
        let cw, ch;
        function resize() {
            cw = canvas.width = canvas.parentElement.clientWidth;
            ch = canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // โหลดรูปภาพ
        const cookieImg = new Image();
        cookieImg.src = 'คุกกี้.png';
        const boxImg = new Image();
        boxImg.src = 'ถาด.png';

        // ตัวแปรเกม
        let state = 'start'; // start, playing, dropping, gameover
        let score = 0;
        let cameraY = 0;
        let targetCameraY = 0;

        const config = {
            cookieWidth: 80,
            cookieHeight: 40,
            boxWidth: 100,
            boxHeight: 80,
            speed: 4,
            dropSpeed: 10
        };

        let currentCookie = null;
        let stack = []; // เก็บคุ้กกี้ที่ต่อสำเร็จ
        let box = null;

        function initGame() {
            score = 0;
            scoreDisplay.innerText = score;
            cameraY = 0;
            targetCameraY = 0;
            stack = [];
            
            box = {
                x: cw / 2,
                y: ch - 100,
                w: config.boxWidth,
                h: config.boxHeight
            };

            spawnCookie();
            state = 'playing';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // เล่นเพลง (เบราว์เซอร์อนุญาตเพราะเกิดจากการคลิกของผู้ใช้)
            bgMusic.volume = 0.5;
            bgMusic.play().catch(e => console.log("Music play prevented until user interaction."));
            
            requestAnimationFrame(gameLoop);
        }

        function spawnCookie() {
            currentCookie = {
                x: cw / 2,
                y: ch / 4 - cameraY, // ลอยอยู่ด้านบนเสมอ
                w: config.cookieWidth,
                h: config.cookieHeight,
                vx: config.speed * (Math.random() > 0.5 ? 1 : -1)
            };
        }

        function dropCookie() {
            if (state === 'playing') {
                state = 'dropping';
            }
        }

        // จัดการการแตะหน้าจอ/คลิก
        canvas.addEventListener('mousedown', dropCookie);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dropCookie(); });
        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);

        function drawFallbackCookie(x, y, w, h) {
            ctx.fillStyle = '#D2A679';
            ctx.beginPath();
            ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
            ctx.fill();
            // วาดช็อกโกแลตชิป
            ctx.fillStyle = '#4A2511';
            ctx.beginPath(); ctx.arc(x - 15, y - 5, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 15, y + 5, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x, y + 8, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawFallbackBox(x, y, w, h) {
            ctx.fillStyle = '#F4A460';
            ctx.fillRect(x - w/2, y - h/2, w, h);
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(x - w/2, y - h/2, w, 15);
        }

        function gameLoop() {
            if (state === 'start') return;

            // เลื่อนกล้องให้สมูท
            cameraY += (targetCameraY - cameraY) * 0.1;

            ctx.clearRect(0, 0, cw, ch);
            ctx.save();
            ctx.translate(0, cameraY); // เลื่อนมุมกล้องลงเมื่อชั้นสูงขึ้น

            // วาดกล่อง
            if (boxImg.complete && boxImg.naturalHeight !== 0) {
                ctx.drawImage(boxImg, box.x - box.w/2, box.y - box.h/2, box.w, box.h);
            } else {
                drawFallbackBox(box.x, box.y, box.w, box.h);
            }

            // วาดคุ้กกี้ที่ซ้อนกัน
            stack.forEach(c => {
                if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                    ctx.drawImage(cookieImg, c.x - c.w/2, c.y - c.h/2, c.w, c.h);
                } else {
                    drawFallbackCookie(c.x, c.y, c.w, c.h);
                }
            });

            // อัปเดตและวาดคุ้กกี้ปัจจุบัน
            if (currentCookie) {
                if (state === 'playing') {
                    currentCookie.x += currentCookie.vx;
                    // ชนขอบเด้งกลับ
                    if (currentCookie.x - currentCookie.w/2 < 0 || currentCookie.x + currentCookie.w/2 > cw) {
                        currentCookie.vx *= -1;
                        currentCookie.x = Math.max(currentCookie.w/2, Math.min(cw - currentCookie.w/2, currentCookie.x));
                    }
                } else if (state === 'dropping') {
                    currentCookie.y += config.dropSpeed;
                    
                    // เป้าหมายที่จะชน (ชิ้นบนสุด หรือ กล่อง)
                    let target = stack.length > 0 ? stack[stack.length - 1] : box;
                    let targetTopY = target.y - target.h/2;
                    
                    // เช็คชน
                    if (currentCookie.y + currentCookie.h/2 >= targetTopY) {
                        let distance = Math.abs(currentCookie.x - target.x);
                        let tolerance = (currentCookie.w + target.w) / 4; // กะให้พอดี

                        if (distance < tolerance) {
                            // ซ้อนสำเร็จ! (จัดตำแหน่งให้ตรงเป๊ะ แบบ "พอดี")
                            currentCookie.y = targetTopY - currentCookie.h/2 + 5; // +5 ให้ดูซ้อนทับกันนิดนึง
                            currentCookie.x = target.x; // ดูดเข้าตรงกลาง
                            stack.push(currentCookie);
                            score++;
                            scoreDisplay.innerText = score;
                            
                            // เลื่อนกล้องลง
                            targetCameraY += (currentCookie.h - 5);
                            
                            spawnCookie();
                            state = 'playing';
                        } else {
                            // พลาด ตกหล่น
                            state = 'gameover';
                            finalScoreDisplay.innerText = score;
                            gameOverScreen.style.display = 'block';
                        }
                    }
                }

                // วาดตัวปัจจุบัน
                if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                    ctx.drawImage(cookieImg, currentCookie.x - currentCookie.w/2, currentCookie.y - currentCookie.h/2, currentCookie.w, currentCookie.h);
                } else {
                    drawFallbackCookie(currentCookie.x, currentCookie.y, currentCookie.w, currentCookie.h);
                }
            }

            ctx.restore();

            if (state !== 'start') {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
