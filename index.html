<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คุ้กกี้ของน้องปฐมนิเทศ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h1 id="game-title">คุ้กกี้ของน้องปฐมนิเทศ</h1>
        
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="start-screen" class="overlay">
            <h2>พร้อมจะเรียงคุ้กกี้หรือยัง?</h2>
            <p>แตะหน้าจอเพื่อปล่อยคุ้กกี้ลงกล่องให้ตรงชั้น</p>
            <button id="start-btn">เริ่มเกม!</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h2>คุ้กกี้ตกซะแล้ว!</h2>
            <p>คุณต่อได้ทั้งหมด: <span id="final-score">0</span> ชั้น</p>
            <button id="restart-btn">เล่นอีกครั้ง</button>
        </div>
    </div>

    <audio id="bgm" src="assets/bgm.mp3" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
