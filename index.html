<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คุ้กกี้ของน้องปฐมนิเทศ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* นำเข้าไฟล์ฟอนต์ของคุณ */
        @font-face {
            font-family: 'DSBanballTester';
            src: url('DSBanballTester.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            /* ใช้ฟอนต์ที่คุณต้องการ และสำรองด้วย Prompt (ฟอนต์ไม่มีหัว) */
            font-family: 'DSBanballTester', 'Prompt', sans-serif; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* ป้องกันการเลื่อนหน้าจอตอนเล่นบนมือถือ */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* ขนาดพอดีบนคอมพิวเตอร์และมือถือ */
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #d2a679; /* สีโทนคุกกี้ / น้ำตาลทองด้าน มินิมอล */
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 1px;
        }

        p {
            color: #777;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #d2a679;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(210, 166, 121, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            background-color: #b88a5b;
        }

        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.8rem;
            font-weight: 600;
            color: #d2a679;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">ชั้นที่: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu" class="ui-layer">
        <h1>คุ้กกี้ของน้องปฐมนิเทศ</h1>
        <p>แตะหน้าจอเพื่อให้คุ้กกี้ซ้อนกัน</p>
        <button class="btn" id="start-btn">เริ่มปฐมนิเทศ</button>
    </div>

    <div id="game-over" class="ui-layer hidden">
        <h1 style="color: #e57373;">ว้า! คุ้กกี้ตกซะแล้ว</h1>
        <p id="final-score">ต่อได้ทั้งหมด: 0 ชั้น</p>
        <button class="btn" id="restart-btn">ต่อใหม่</button>
    </div>
</div>

<audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startMenu = document.getElementById('start-menu');
    const gameOverMenu = document.getElementById('game-over');
    const scoreBoard = document.getElementById('score-board');
    const finalScoreText = document.getElementById('final-score');
    const bgm = document.getElementById('bgm');

    // ตั้งค่ารูปภาพ
    const cookieImg = new Image();
    cookieImg.src = 'คุกกี้.png'; // เปลี่ยนเป็นชื่อไฟล์รูปคุ้กกี้
    const boxImg = new Image();
    boxImg.src = 'ถาด.png'; // เปลี่ยนเป็นชื่อไฟล์รูปกล่อง

    // ตัวแปรระบบเกม
    let animationId;
    let score = 0;
    let gameState = 'menu'; // menu, playing, gameover
    let cameraY = 0; // สำหรับเลื่อนกล้องลงเมื่อคุ้กกี้สูงขึ้น
    
    // ตั้งค่าขนาด Entities
    const COOKIE_SIZE = 80;
    const BOX_WIDTH = 120;
    const BOX_HEIGHT = 80;

    let cookies = [];
    let activeCookie = null; // คุ้กกี้ที่กำลังแกว่งหรือกำลังตก
    let swingAngle = 0;

    // การปรับขนาด Canvas ให้พอดีหน้าจอและคมชัด (Retina Display)
    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // สร้างคุ้กกี้ชิ้นใหม่ด้านบน
    function spawnCookie() {
        activeCookie = {
            x: canvas.width / 2,
            y: 100, // จุดที่ห้อยลงมา
            state: 'swinging', // swinging, falling
            speedY: 0
        };
    }

    // เริ่มเกมใหม่
    function initGame() {
        score = 0;
        cameraY = 0;
        cookies = [];
        scoreBoard.innerText = `ชั้นที่: ${score}`;
        spawnCookie();
        gameState = 'playing';
        startMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        
        // เล่นเพลง
        bgm.volume = 0.5;
        bgm.play().catch(e => console.log("รอผู้ใช้โต้ตอบเพื่อเล่นเพลง"));

        cancelAnimationFrame(animationId);
        gameLoop();
    }

    // จบเกม
    function triggerGameOver() {
        gameState = 'gameover';
        finalScoreText.innerText = `ต่อได้ทั้งหมด: ${score} ชั้น`;
        gameOverMenu.classList.remove('hidden');
    }

    // วาดคุ้กกี้ (มี Fallback ถ้ารูปยังไม่โหลด)
    function drawCookie(x, y) {
        if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
            ctx.drawImage(cookieImg, x - COOKIE_SIZE/2, y - COOKIE_SIZE/2, COOKIE_SIZE, COOKIE_SIZE);
        } else {
            // สำรองถ้ารูปไม่มี วาดวงกลมสีน้ำตาลอ่อน
            ctx.beginPath();
            ctx.arc(x, y, COOKIE_SIZE/2.2, 0, Math.PI * 2);
            ctx.fillStyle = "#e6c280";
            ctx.fill();
            // วาดช็อกโกแลตชิพ
            ctx.fillStyle = "#5c3a21";
            ctx.beginPath(); ctx.arc(x - 10, y - 10, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 15, y - 5, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x - 5, y + 15, 7, 0, Math.PI*2); ctx.fill();
        }
    }

    // วาดกล่อง (มี Fallback ถ้ารูปยังไม่โหลด)
    function drawBox(x, y) {
        if (boxImg.complete && boxImg.naturalHeight !== 0) {
            ctx.drawImage(boxImg, x - BOX_WIDTH/2, y, BOX_WIDTH, BOX_HEIGHT);
        } else {
            ctx.fillStyle = "#d2a679";
            ctx.fillRect(x - BOX_WIDTH/2, y, BOX_WIDTH, BOX_HEIGHT);
            ctx.fillStyle = "#b88a5b";
            ctx.fillRect(x - BOX_WIDTH/2, y, BOX_WIDTH, 15);
        }
    }

    // ลูปหลักของเกม
    function gameLoop() {
        if (gameState !== 'playing') return;

        // ล้างหน้าจอ
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // คำนวณตำแหน่งฐาน (กล่อง)
        const boxBaseY = canvas.height - 100 + cameraY;
        const boxCenterX = canvas.width / 2;

        // 1. วาดกล่อง
        drawBox(boxCenterX, boxBaseY);

        // 2. วาดคุ้กกี้ที่ซ้อนกันแล้ว
        cookies.forEach(cookie => {
            drawCookie(cookie.x, cookie.y + cameraY);
        });

        // 3. จัดการคุ้กกี้ที่กำลังเล่น (Active)
        if (activeCookie) {
            if (activeCookie.state === 'swinging') {
                // แกว่งไปมา
                swingAngle += 0.05;
                const swingAmplitude = canvas.width / 2 - COOKIE_SIZE;
                activeCookie.x = (canvas.width / 2) + Math.sin(swingAngle) * swingAmplitude;
                drawCookie(activeCookie.x, activeCookie.y);
            } 
            else if (activeCookie.state === 'falling') {
                // ตกลงมา
                activeCookie.speedY += 0.5; // แรงโน้มถ่วง
                activeCookie.y += activeCookie.speedY;
                drawCookie(activeCookie.x, activeCookie.y + cameraY);

                // เช็คการชน (Collision)
                let targetY = boxBaseY;
                let targetX = boxCenterX;
                let tolerance = BOX_WIDTH / 1.5;

                if (cookies.length > 0) {
                    const topCookie = cookies[cookies.length - 1];
                    targetY = topCookie.y;
                    targetX = topCookie.x;
                    tolerance = COOKIE_SIZE * 0.8; // ความแม่นยำที่ยอมให้ต่อติด
                }

                // ถ้าตกลงมาถึงระดับชั้นบนสุด
                if (activeCookie.y >= targetY - (COOKIE_SIZE * 0.4)) {
                    // เช็คว่าลงตรงตำแหน่งหรือไม่
                    if (Math.abs(activeCookie.x - targetX) < tolerance) {
                        // ลงพอดี! จับให้มัน Snap ตรงกลางเป๊ะๆ (ซ้อนพอดีติดกันแบบมินิมอล)
                        activeCookie.x = targetX; 
                        activeCookie.y = targetY - (COOKIE_SIZE * 0.35); // ความหนาของคุ้กกี้ให้ซ้อนพอดี
                        
                        // เพิ่มเข้ากอง
                        cookies.push({...activeCookie});
                        score++;
                        scoreBoard.innerText = `ชั้นที่: ${score}`;
                        
                        // เลื่อนกล้องลงหากสูงเกินครึ่งจอ
                        if (canvas.height - (activeCookie.y + cameraY) > canvas.height / 2) {
                            cameraY += COOKIE_SIZE;
                        }
                        
                        spawnCookie(); // เรียกชิ้นใหม่
                    } else {
                        // พลาด!
                        triggerGameOver();
                    }
                }

                // ถ้าตกทะลุจอ (กรณีพลาดขอบจอ)
                if (activeCookie.y + cameraY > canvas.height + 100) {
                    triggerGameOver();
                }
            }
        }

        animationId = requestAnimationFrame(gameLoop);
    }

    // ควบคุมการกด (รองรับทั้งเมาส์และหน้าจอสัมผัส)
    function handleDrop() {
        if (gameState === 'playing' && activeCookie && activeCookie.state === 'swinging') {
            activeCookie.state = 'falling';
        }
    }

    window.addEventListener('mousedown', handleDrop);
    window.addEventListener('touchstart', (e) => {
        // ป้องกันไม่ให้ปุ่มเมนูถูกกดซ้อน
        if(e.target.tagName !== 'BUTTON') { 
            e.preventDefault(); 
            handleDrop(); 
        }
    }, {passive: false});

    document.getElementById('start-btn').addEventListener('click', initGame);
    document.getElementById('restart-btn').addEventListener('click', initGame);

</script>
</body>
</html>
