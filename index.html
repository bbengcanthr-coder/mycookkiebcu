<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คุ้กกี้ของน้องปฐมนิเทศ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* นำเข้าฟอนต์ DSBanballTester (ต้องมีไฟล์ .ttf อยู่ในโฟลเดอร์เดียวกันบน GitHub) */
        @font-face {
            font-family: 'DSBanballTester';
            src: url('DSBanballTester.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* ฟอนต์หลักของโปรเจกต์เว็บเน้นแบบไม่มีหัวเพื่อความทันสมัย */
            font-family: 'DSBanballTester', 'Prompt', sans-serif;
            background-color: #ffffff;
            /* พื้นหลังลายโพกาดอทสีดำจางๆ */
            background-image: radial-gradient(#e0e0e0 15%, transparent 16%), radial-gradient(#e0e0e0 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            touch-action: none; /* ป้องกันการเลื่อนหน้าจอตอนกดเล่นบนมือถือ */
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* ให้คลิกทะลุไปโดนตัวเกมได้ */
            width: 100%;
        }

        #game-title {
            font-size: 2.5rem;
            margin: 0;
            font-weight: bold;
            /* ใช้ text-shadow สีเข้มบางๆ เพื่อให้สีพาสเทลลอยเด่นขึ้นมาจากพื้นขาว */
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1); 
        }

        #score-board {
            font-size: 1.5rem;
            color: #555;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 20px;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* ตัวแสดงคุกกี้ที่ลอยไปมาด้านบน */
        #spawner {
            position: absolute;
            top: 100px;
            width: 60px; /* ขนาดคุกกี้ */
            height: 60px;
            background-image: url('คุกกี้.png'); /* เปลี่ยนเป็นชื่อไฟล์ภาพคุกกี้ของคุณ */
            background-size: cover;
            z-index: 5;
            transition: transform 0.1s;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 20;
            display: none;
            width: 80%;
            max-width: 300px;
        }

        #game-over h2 {
            color: #ff6b6b;
            margin-top: 0;
        }

        button {
            font-family: 'Prompt', sans-serif;
            background-color: #a2d2ff;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0px #82b2df;
            transition: all 0.1s;
            margin-top: 15px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #82b2df;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="cute-music.mp3" loop preload="auto"></audio>

    <div id="game-container">
        <div id="ui-layer">
            <h1 id="game-title">คุ้กกี้ของน้องปฐมนิเทศ</h1>
            <div id="score-board">คะแนน: <span id="score">0</span></div>
        </div>

        <div id="spawner"></div>

        <div id="game-over">
            <h2>อ๊ะ! คุกกี้ตกแล้ว</h2>
            <p>ต่อได้ทั้งหมด: <span id="final-score">0</span> ชิ้น</p>
            <button onclick="restartGame()">เริ่มเล่นใหม่</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // 1. จัดการสีตัวอักษร Title ให้เป็นสีพาสเทลสลับกัน
        const titleEl = document.getElementById('game-title');
        const titleText = titleEl.innerText;
        titleEl.innerHTML = '';
        const pastelColors = ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#e8b9fe'];
        
        for(let i = 0; i < titleText.length; i++) {
            let span = document.createElement('span');
            span.innerText = titleText[i];
            span.style.color = pastelColors[i % pastelColors.length];
            titleEl.appendChild(span);
        }

        // 2. ตั้งค่าระบบฟิสิกส์ (Matter.js)
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Events = Matter.Events;

        let engine, render, runner;
        let score = 0;
        let isGameOver = false;
        let spawnerX = 0;
        let time = 0;
        
        const spawnerEl = document.getElementById('spawner');
        const scoreEl = document.getElementById('score');
        const music = document.getElementById('bg-music');
        
        // กำหนดขนาดภาพ
        const COOKIE_RADIUS = 30; // รัศมีคุกกี้ (รวมเป็น 60px)
        const BOX_WIDTH = 200;
        const BOX_HEIGHT = 150;

        function initGame() {
            engine = Engine.create();
            // ลด Gravity ลงนิดหน่อยให้ดูนุ่มนวล
            engine.world.gravity.y = 0.8; 

            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // สร้างกล่องรับคุกกี้ด้านล่าง
            const centerX = window.innerWidth / 2;
            const bottomY = window.innerHeight - 50;
            const wallThickness = 20;

            const boxOptions = { 
                isStatic: true, 
                render: { fillStyle: 'transparent' } // ซ่อนสีพื้นฐาน
            };

            // สร้างกล่อง 3 ด้าน (พื้น, ซ้าย, ขวา)
            const ground = Bodies.rectangle(centerX, bottomY, BOX_WIDTH, wallThickness, boxOptions);
            const leftWall = Bodies.rectangle(centerX - BOX_WIDTH/2 + wallThickness/2, bottomY - BOX_HEIGHT/2, wallThickness, BOX_HEIGHT, boxOptions);
            const rightWall = Bodies.rectangle(centerX + BOX_WIDTH/2 - wallThickness/2, bottomY - BOX_HEIGHT/2, wallThickness, BOX_HEIGHT, boxOptions);
            
            // ใช้ Sprite ภาพกล่องผูกติดกับพื้นกล่อง
            ground.render.sprite = {
                texture: 'ถาด.png', // เปลี่ยนเป็นชื่อไฟล์ภาพกล่องของคุณ
                xScale: 1,
                yScale: 1,
                yOffset: -0.4 // ยกภาพกล่องขึ้นมาให้ครอบผนัง
            };

            Composite.add(engine.world, [ground, leftWall, rightWall]);

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            // ตรวจสอบว่าคุกกี้ตกขอบจอหรือไม่ (Game Over)
            Events.on(engine, 'beforeUpdate', function() {
                const bodies = Composite.allBodies(engine.world);
                for (let i = 0; i < bodies.length; i++) {
                    let body = bodies[i];
                    // ถ้าคุกกี้ร่วงลงไปเกินหน้าจอ ถือว่าจบเกม
                    if (!body.isStatic && body.position.y > window.innerHeight + 100) {
                        triggerGameOver();
                    }
                }
            });

            requestAnimationFrame(animateSpawner);
        }

        // แอนิเมชันให้ Spawner (จุดปล่อย) ลอยไปมาซ้ายขวา
        function animateSpawner() {
            if(isGameOver) return;
            time += 0.05;
            const screenWidth = window.innerWidth;
            const range = (screenWidth / 2) - 40;
            // คำนวณตำแหน่ง X ด้วยฟังก์ชัน Sine wave
            spawnerX = (screenWidth / 2) + Math.sin(time) * range;
            
            // อัปเดตตำแหน่งภาพ Spawner
            spawnerEl.style.left = (spawnerX - COOKIE_RADIUS) + 'px';
            requestAnimationFrame(animateSpawner);
        }

        // เมื่อกดคลิกหรือแตะหน้าจอ จะทำการปล่อยคุกกี้
        function dropCookie(e) {
            if(isGameOver) return;
            
            // กดครั้งแรกให้เพลงเล่นอัตโนมัติ (เบราว์เซอร์บังคับให้ต้องมี Interaction ก่อนถึงจะเล่นเสียงได้)
            if (music.paused) {
                music.play().catch(e => console.log("รอผู้ใช้โต้ตอบเพื่อเล่นเพลง"));
            }

            // สร้าง Body คุกกี้ในระบบ Matter.js
            const cookie = Bodies.circle(spawnerX, 100 + COOKIE_RADIUS, COOKIE_RADIUS, {
                restitution: 0.3, // ความเด้ง
                friction: 0.5, // ความฝืด
                density: 0.05, // น้ำหนัก
                render: {
                    sprite: {
                        texture: 'คุกกี้.png', // เปลี่ยนเป็นชื่อไฟล์ภาพคุกกี้ของคุณ
                        xScale: 1,
                        yScale: 1
                    }
                }
            });

            Composite.add(engine.world, cookie);
            score++;
            scoreEl.innerText = score;
        }

        function triggerGameOver() {
            if(isGameOver) return;
            isGameOver = true;
            document.getElementById('final-score').innerText = score - 1; // ลบ 1 ชิ้นที่ร่วงไป
            document.getElementById('game-over').style.display = 'block';
            spawnerEl.style.display = 'none';
        }

        // ฟังก์ชันเริ่มเกมใหม่
        window.restartGame = function() {
            // ล้างโลกฟิสิกส์เดิม
            Render.stop(render);
            Runner.stop(runner);
            render.canvas.remove();
            engine.world.bodies = [];
            
            // รีเซ็ตค่าต่างๆ
            score = 0;
            scoreEl.innerText = score;
            isGameOver = false;
            document.getElementById('game-over').style.display = 'none';
            spawnerEl.style.display = 'block';
            
            initGame();
        };

        // รองรับการคลิกเมาส์และทัชสกรีน
        document.body.addEventListener('mousedown', dropCookie);
        document.body.addEventListener('touchstart', dropCookie, {passive: false});

        // เริ่มต้นทำงาน
        window.onload = initGame;
        
        // อัปเดตขนาดเวลาหมุนจอ (มือถือ)
        window.addEventListener('resize', () => {
            if(render) {
                render.canvas.width = window.innerWidth;
                render.canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
