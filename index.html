<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คุ้กกี้ของน้องปฐมนิเทศ</title>
    <style>
        /* นำเข้าฟอนต์ */
        @font-face {
            font-family: 'DSBanballTester';
            src: url('DSBanballTester.ttf') format('truetype');
            /* หากยังไม่มีไฟล์ฟอนต์ จะใช้ฟอนต์สำรองชั่วคราว */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* พื้นหลังสีขาว ลายโพกาดอทสีดำจางๆ */
            background-image: radial-gradient(rgba(0, 0, 0, 0.08) 3px, transparent 3px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'DSBanballTester', 'Comic Sans MS', sans-serif;
            overflow: hidden;
            touch-action: none; /* ป้องกันการเลื่อนหน้าจอบนมือถือ */
        }

        /* ตั้งค่าความกว้างให้พอดีทั้งคอมและมือถือ */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* ขนาดสูงสุดบนจอคอม */
            height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background-color: rgba(255, 255, 255, 0.5); /* ให้พื้นหลังโปร่งแสงนิดๆ */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        /* ชื่อเกม */
        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
            line-height: 1.2;
            padding: 0 10px;
        }

        #score-display {
            font-size: 2rem;
            color: #ff9a9e;
            text-shadow: 1px 1px 0px #fff;
            margin-top: -10px;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            border: 4px dashed #ffb3ba;
            pointer-events: auto;
        }

        #game-over h2 {
            color: #ff9a9e;
            font-size: 2.5rem;
            margin: 0 0 15px 0;
        }

        button {
            font-family: 'DSBanballTester', 'Comic Sans MS', sans-serif;
            background-color: #baffc9;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            color: #555;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(186, 255, 201, 0.6);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #a0f0b0;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <div id="ui-layer">
            <h1 id="game-title"></h1>
            <div id="score-display">ชั้นที่: 0</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="game-over">
            <h2>เกมจบแล้ว!</h2>
            <p style="font-size: 1.5rem; color: #666;">ความสูง: <span id="final-score">0</span> ชั้น</p>
            <button onclick="resetGame()">เริ่มเล่นใหม่</button>
        </div>
    </div>

    <script>
        // --- 1. การจัดการสีพาสเทลสลับตัวอักษรของชื่อเกม ---
        const titleText = "คุ้กกี้ของน้องปฐมนิเทศ";
        const pastelColors = ['#000000'];
        const titleElement = document.getElementById('game-title');
        
        let titleHTML = '';
        for (let i = 0; i < titleText.length; i++) {
            const color = pastelColors[i % pastelColors.length];
            titleHTML += `<span style="color: ${color};">${titleText[i]}</span>`;
        }
        titleElement.innerHTML = titleHTML;

        // --- 2. การตั้งค่า Canvas และ ตัวแปรเกม ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // โหลดรูปภาพ
        const cookieImg = new Image();
        cookieImg.src = 'คุกกี้.png';
        
        const boxImg = new Image();
        boxImg.src = 'ถาด.png';

        let width, height;
        let score = 0;
        let gameState = 'playing'; // 'playing', 'gameover'
        let cameraY = 0; 
        let bgMusicPlayed = false;

        // ตัวแปรสำหรับวัตถุในเกม
        const cookieSize = 60;
        const boxWidth = 100;
        const boxHeight = 80;
        
        let movingCookie = { x: 0, y: 100, w: cookieSize, h: cookieSize, speed: 4, direction: 1 };
        let fallingCookie = null;
        let stack = [];
        let box = { x: 0, y: 0, w: boxWidth, h: boxHeight };

        function resizeCanvas() {
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
            
            // วางกล่องไว้ตรงกลางด้านล่าง
            box.x = (width - box.w) / 2;
            box.y = height - box.h - 20;
            
            if (stack.length === 0 && gameState === 'playing') {
                movingCookie.y = 100;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 3. ระบบควบคุม (คลิกหรือแตะหน้าจอ) ---
        function dropCookie(e) {
            // เล่นเพลงเมื่อมีการกดครั้งแรก
            if (!bgMusicPlayed) {
                document.getElementById('bgMusic').play().catch(e => console.log("รอการโต้ตอบจากผู้ใช้"));
                bgMusicPlayed = true;
            }

            if (gameState !== 'playing' || fallingCookie !== null) return;
            
            // ปล่อยคุ้กกี้ให้ตกลงมา
            fallingCookie = {
                x: movingCookie.x,
                y: movingCookie.y - cameraY, // อิงพิกัดโลก (World Y)
                w: cookieSize,
                h: cookieSize,
                speedY: 10
            };
            
            // เตรียมคุ้กกี้ชิ้นใหม่ให้แกว่งรอ
            movingCookie.speed += 0.2; // เพิ่มความเร็วขึ้นนิดหน่อยให้ท้าทาย
            movingCookie.y -= cookieSize; // เลื่อนจุดเกิดขึ้นไป
        }

        canvas.addEventListener('mousedown', dropCookie);
        canvas.addEventListener('touchstart', dropCookie);

        // --- 4. ลอจิกของเกม ---
        function update() {
            if (gameState !== 'playing') return;

            // อัปเดตคุ้กกี้ที่แกว่งไปมา (อิงพิกัดหน้าจอ)
            movingCookie.x += movingCookie.speed * movingCookie.direction;
            if (movingCookie.x <= 0 || movingCookie.x + movingCookie.w >= width) {
                movingCookie.direction *= -1; // เด้งกลับ
            }

            // เลื่อนกล้องให้ตามความสูงของชั้นคุ้กกี้
            let targetCameraY = 0;
            if (stack.length > 2) {
                // ให้คุ้กกี้ชิ้นบนสุดอยู่ประมาณกลางจอ
                targetCameraY = (height / 2) - (box.y - (stack.length * cookieSize));
            }
            // ทำให้กล้องเลื่อนแบบนุ่มนวล
            cameraY += (targetCameraY - cameraY) * 0.1;

            // อัปเดตคุ้กกี้ที่กำลังตก
            if (fallingCookie) {
                fallingCookie.y += fallingCookie.speedY;

                // ตรวจสอบการชน
                let targetY = box.y - cookieSize; // ระดับความสูงที่ต้องชนเริ่มต้น (ชนกล่อง)
                let targetX = box.x;
                let targetW = box.w;

                if (stack.length > 0) {
                    const topCookie = stack[stack.length - 1];
                    targetY = topCookie.y - cookieSize; // เปลี่ยนมาชนคุ้กกี้ชิ้นบนสุดแทน
                    targetX = topCookie.x;
                    targetW = topCookie.w;
                }

                // ถ้าคุ้กกี้ตกลงมาถึงระดับชั้นบนสุด
                if (fallingCookie.y >= targetY) {
                    // ตรวจสอบว่าตกโดนฐานไหม (เหลื่อมกันได้นิดหน่อย)
                    const tolerance = cookieSize * 0.4; 
                    if (fallingCookie.x + fallingCookie.w > targetX + tolerance &&
                        fallingCookie.x < targetX + targetW - tolerance) {
                        
                        // ต่อสำเร็จ!
                        fallingCookie.y = targetY;
                        stack.push(fallingCookie);
                        fallingCookie = null;
                        score++;
                        document.getElementById('score-display').innerText = `ชั้นที่: ${score}`;
                    } else {
                        // พลาด! ตกหล่น
                        gameState = 'gameover';
                        gameOver();
                    }
                }
            }
        }

        // --- 5. การวาดกราฟิก ---
        function draw() {
            ctx.clearRect(0, 0, width, height);

            // วาดกล่อง (ใช้รูปถ้ามี ถ้าไม่มีวาดสี่เหลี่ยมสีพาสเทล)
            ctx.save();
            ctx.translate(0, cameraY); // เลื่อนตำแหน่งวาดตามกล้อง
            
            if (boxImg.complete && boxImg.naturalHeight !== 0) {
                ctx.drawImage(boxImg, box.x, box.y, box.w, box.h);
            } else {
                ctx.fillStyle = '#FFDFBA'; // สีสำรอง
                ctx.fillRect(box.x, box.y, box.w, box.h);
            }

            // วาดชั้นคุ้กกี้ที่ต่อสำเร็จ
            for (let c of stack) {
                if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                    ctx.drawImage(cookieImg, c.x, c.y, c.w, c.h);
                } else {
                    ctx.fillStyle = '#D4A373'; // สีคุ้กกี้สำรอง
                    ctx.beginPath();
                    ctx.arc(c.x + c.w/2, c.y + c.h/2, c.w/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // วาดคุ้กกี้ที่กำลังตก
            if (fallingCookie) {
                if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                    ctx.drawImage(cookieImg, fallingCookie.x, fallingCookie.y, fallingCookie.w, fallingCookie.h);
                } else {
                    ctx.fillStyle = '#D4A373';
                    ctx.beginPath();
                    ctx.arc(fallingCookie.x + fallingCookie.w/2, fallingCookie.y + fallingCookie.h/2, fallingCookie.w/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.restore();

            // วาดคุ้กกี้ที่แกว่งไปมาด้านบน (วาดแยกเพราะไม่อิงกับกล้อง)
            if (gameState === 'playing' && !fallingCookie) {
                if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                    ctx.drawImage(cookieImg, movingCookie.x, movingCookie.y, movingCookie.w, movingCookie.h);
                } else {
                    ctx.fillStyle = '#D4A373';
                    ctx.beginPath();
                    ctx.arc(movingCookie.x + movingCookie.w/2, movingCookie.y + movingCookie.h/2, movingCookie.w/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // --- 6. ลูปหลักของเกม ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- 7. จัดการสถานะเกม ---
        function gameOver() {
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'block';
        }

        function resetGame() {
            score = 0;
            stack = [];
            cameraY = 0;
            fallingCookie = null;
            movingCookie = { x: 0, y: 100, w: cookieSize, h: cookieSize, speed: 4, direction: 1 };
            gameState = 'playing';
            document.getElementById('score-display').innerText = `ชั้นที่: 0`;
            document.getElementById('game-over').style.display = 'none';
        }

        // เริ่มเกม
        gameLoop();

    </script>
</body>
</html>
