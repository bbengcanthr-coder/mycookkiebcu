<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คุ้กกี้ของน้องปฐมนิเทศ</title>
    <style>
        /* ตั้งค่าฟอนต์ DSBanballTester */
        @font-face {
            font-family: 'DSBanballTester';
            src: url('DSBanballTester.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ปิดการเลื่อนหน้าจอ */
            /* พื้นหลังสีขาว ลายโพกาดอทสีดำจางๆ */
            background-color: #ffffff;
            background-image: radial-gradient(rgba(0, 0, 0, 0.1) 15%, transparent 16%), 
                              radial-gradient(rgba(0, 0, 0, 0.1) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            touch-action: none; /* ป้องกันการซูมหรือเลื่อนบนมือถือ */
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ซ่อน Audio Player */
        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');

        // ปรับขนาด Canvas ให้พอดีจอ
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // โหลดรูปภาพ (ตั้งชื่อไฟล์ให้ตรงกับรูปที่คุณมี)
        const cookieImg = new Image();
        cookieImg.src = 'คุกกี้.png'; 
        
        const boxImg = new Image();
        boxImg.src = 'ถาด.png';

        // โทนสีพาสเทลสำหรับตัวหนังสือ
        const pastelColors = ['#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#E8B4F8'];

        // ตัวแปรสถานะเกม
        let state = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let cameraY = 0; // สำหรับเลื่อนกล้องเมื่อคุ้กกี้สูงขึ้น

        // ขนาดอ้างอิง
        const baseWidth = 100;
        const baseHeight = 100;

        // วัตถุในเกม
        let box = { x: 0, y: 0, w: 120, h: 100 };
        let stack = [];
        let activeCookie = null;

        function initGame() {
            score = 0;
            cameraY = 0;
            stack = [];
            box.x = canvas.width / 2;
            box.y = canvas.height - 120;
            spawnCookie();
        }

        function spawnCookie() {
            activeCookie = {
                x: canvas.width / 2,
                y: 100 - cameraY,
                w: 90,
                h: 50,
                speedX: 4 + (score * 0.3), // เร็วขึ้นเรื่อยๆ
                speedY: 0,
                falling: false
            };
            // สุ่มให้เริ่มวิ่งซ้ายหรือขวา
            if (Math.random() > 0.5) activeCookie.speedX *= -1;
        }

        // ฟังก์ชันวาดตัวหนังสือสลับสีพาสเทล
        function drawPastelText(text, x, y, fontSize) {
            ctx.font = `${fontSize}px DSBanballTester, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // คำนวณความกว้างรวมเพื่อให้อยู่ตรงกลาง
            let totalWidth = ctx.measureText(text).width;
            let currentX = x - (totalWidth / 2);

            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let charWidth = ctx.measureText(char).width;
                
                // ใส่ขอบสีดำบางๆ ให้ตัวหนังสืออ่านง่ายขึ้น
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#333';
                ctx.strokeText(char, currentX + (charWidth / 2), y);

                // เติมสีพาสเทล
                ctx.fillStyle = pastelColors[i % pastelColors.length];
                ctx.fillText(char, currentX + (charWidth / 2), y);
                
                currentX += charWidth;
            }
        }

        // ฟังก์ชันหลักในการอัปเดตและวาดหน้าจอ
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state === 'START') {
                drawPastelText("คุ้กกี้ของน้องปฐมนิเทศ", canvas.width / 2, canvas.height / 2 - 50, 60);
                drawPastelText("แตะหน้าจอเพื่อเริ่มเล่น", canvas.width / 2, canvas.height / 2 + 30, 30);
            } 
            else if (state === 'PLAYING' || state === 'GAMEOVER') {
                // เลื่อนกล้อง (Camera Pan) เมื่อกองคุ้กกี้สูงเกินไป
                let targetCameraY = 0;
                if (stack.length > 0) {
                    let topY = stack[stack.length - 1].y;
                    if (topY + cameraY < canvas.height / 2) {
                        targetCameraY = (canvas.height / 2) - topY;
                    }
                }
                cameraY += (targetCameraY - cameraY) * 0.1; // เลื่อนแบบสมูทๆ

                // วาดกล่อง
                if (boxImg.complete && boxImg.naturalHeight !== 0) {
                    ctx.drawImage(boxImg, box.x - box.w/2, box.y + cameraY, box.w, box.h);
                } else {
                    ctx.fillStyle = '#D2B48C'; // สีเผื่อรูปไม่โหลด
                    ctx.fillRect(box.x - box.w/2, box.y + cameraY, box.w, box.h);
                }

                // วาดกองคุ้กกี้ที่ต่อไว้
                for (let c of stack) {
                    if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                        ctx.drawImage(cookieImg, c.x - c.w/2, c.y + cameraY, c.w, c.h);
                    } else {
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(c.x - c.w/2, c.y + cameraY, c.w, c.h);
                    }
                }

                // อัปเดตและวาดคุ้กกี้ตัวที่กำลังเคลื่อนที่/ตก
                if (activeCookie) {
                    if (!activeCookie.falling && state === 'PLAYING') {
                        activeCookie.x += activeCookie.speedX;
                        // ชนขอบเด้งกลับ
                        if (activeCookie.x - activeCookie.w/2 < 0 || activeCookie.x + activeCookie.w/2 > canvas.width) {
                            activeCookie.speedX *= -1;
                        }
                    } else if (activeCookie.falling) {
                        activeCookie.y += activeCookie.speedY;
                        
                        // ตรวจสอบการชน
                        let targetY = box.y - activeCookie.h + 20; // 20 คือระยะซ้อนเหลื่อมให้ดูมีมิติ
                        let targetX = box.x;
                        
                        if (stack.length > 0) {
                            let topCookie = stack[stack.length - 1];
                            targetY = topCookie.y - activeCookie.h + 20;
                            targetX = topCookie.x;
                        }

                        // ถ้าตกลงมาถึงระดับที่ต้องเช็คชน
                        if (activeCookie.y >= targetY) {
                            let distanceX = Math.abs(activeCookie.x - targetX);
                            let maxTolerance = activeCookie.w * 0.7; // ความยาก (ยอมให้เบี้ยวได้ 70%)

                            if (distanceX < maxTolerance) {
                                // ต่อสำเร็จ
                                activeCookie.y = targetY; // จัดตำแหน่งให้เป๊ะ
                                stack.push({...activeCookie});
                                score++;
                                spawnCookie();
                            } else {
                                // พลาดเป้า ทะลุร่วงลงไป
                                if (activeCookie.y > canvas.height + 100 - cameraY) {
                                    state = 'GAMEOVER';
                                    activeCookie = null;
                                }
                            }
                        }
                    }

                    // วาดคุ้กกี้ตัวปัจจุบัน
                    if (activeCookie) {
                        if (cookieImg.complete && cookieImg.naturalHeight !== 0) {
                            ctx.drawImage(cookieImg, activeCookie.x - activeCookie.w/2, activeCookie.y + cameraY, activeCookie.w, activeCookie.h);
                        } else {
                            ctx.fillStyle = '#A0522D';
                            ctx.fillRect(activeCookie.x - activeCookie.w/2, activeCookie.y + cameraY, activeCookie.w, activeCookie.h);
                        }
                    }
                }

                // แสดงคะแนน
                drawPastelText("ชั้นที่: " + score, canvas.width / 2, 50, 40);

                if (state === 'GAMEOVER') {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    drawPastelText("คุ้กกี้ตกซะแล้ว!", canvas.width / 2, canvas.height / 2 - 40, 60);
                    drawPastelText("ได้ทั้งหมด: " + score + " ชั้น", canvas.width / 2, canvas.height / 2 + 20, 40);
                    drawPastelText("แตะเพื่อเล่นใหม่", canvas.width / 2, canvas.height / 2 + 80, 30);
                }
            }

            requestAnimationFrame(loop);
        }

        // รับค่าการกดหน้าจอ
        window.addEventListener('pointerdown', (e) => {
            if (state === 'START') {
                // เริ่มเกมและเล่นเพลง
                bgMusic.play().catch(e => console.log("รอผู้ใช้ตอบสนองก่อนเล่นเพลง"));
                initGame();
                state = 'PLAYING';
            } else if (state === 'PLAYING') {
                if (activeCookie && !activeCookie.falling) {
                    activeCookie.falling = true;
                    activeCookie.speedY = 15; // ความเร็วตอนตก
                }
            } else if (state === 'GAMEOVER') {
                initGame();
                state = 'PLAYING';
            }
        });

        // เริ่มลูปเกม
        loop();
    </script>
</body>
</html>
